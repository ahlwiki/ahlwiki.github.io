<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Knightmare Frame图鉴</title>
    <link rel="icon" type="image/x-icon" href="./Site-favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Segoe UI', 'Roboto', 'Orbitron', system-ui, sans-serif;
            color: #e6e9f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(230, 200, 100, 0.4);
            padding-bottom: 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #f0e6a0, #b8860b, #d4af37);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .header p {
            color: #9aaec0;
            margin-top: 0.5rem;
        }

        /* 筛选栏 (桌面版) */
        .filter-bar {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 40px;
            padding: 0.9rem 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #d4af37;
            min-width: 70px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .filter-btn {
            background: #1f2a3e;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #e6e9f0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #d4af37;
            color: #0a0f1a;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.6);
        }

        /* 机体网格 */
        .kmf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.2rem;
        }

        .kmf-card {
            background: rgba(15, 22, 35, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            padding: 0.8rem;
            gap: 1rem;
        }

        .kmf-card:hover {
            transform: translateY(-4px);
            border-color: #d4af37;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            background: rgba(20, 30, 48, 0.92);
        }

        .card-img {
            width: 60px;
            height: 85px;
            flex-shrink: 0;
            background: #0a0f18;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .card-info {
            flex: 1;
            overflow: hidden;
        }

        .card-info .chinese-name {
            font-size: 1rem;
            font-weight: 600;
            color: #ffdd99;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-info .english-name {
            font-size: 0.7rem;
            color: #9aaec9;
            margin-top: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-result {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #e0b05c;
            grid-column: 1 / -1;
        }

        .loading,
        .error-msg {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }

        .error-msg {
            color: #e07c5c;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            color: #6b7e9e;
            font-size: 0.8rem;
        }

        /* ========== 移动端专属样式 ========== */
        @media (max-width: 640px) {
            .container {
                padding: 1rem;
                padding-bottom: 80px;  /* 为底部抽屉留出空间 */
            }

            /* 隐藏桌面版筛选栏 */
            .filter-bar {
                display: none;
            }

            /* 卡片改为垂直布局 */
            .kmf-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: 0.6rem;
            }

            .card-info {
                width: 100%;
                text-align: center;
            }

            .card-info .chinese-name,
            .card-info .english-name {
                white-space: normal;
                text-align: center;
            }

            /* 移动端抽屉筛选器 */
            .mobile-drawer {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 1000;
                background: rgba(10, 15, 26, 0.95);
                backdrop-filter: blur(16px);
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease;
                transform: translateY(calc(100% - 48px)); /* 默认只露出头部 */
            }

            .mobile-drawer.open {
                transform: translateY(0);
            }

            .drawer-handle {
                padding: 12px;
                text-align: center;
                cursor: pointer;
                user-select: none;
                background: rgba(0, 0, 0, 0.3);
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                touch-action: pan-y;  /* 保留垂直滚动时的手势？但为了拖拽需要部分覆盖 */
            }

            .drawer-handle span:first-child {
                font-size: 1rem;
                font-weight: bold;
                color: #d4af37;
                letter-spacing: 2px;
            }

            .drawer-handle .drag-bar {
                width: 40px;
                height: 4px;
                background: #9aaec9;
                border-radius: 4px;
                margin-top: 4px;
            }

            .drawer-content {
                max-height: 60vh;
                overflow-y: auto;
                padding: 0 1rem 1rem;
                scrollbar-width: thin;
            }

            /* 抽屉内部筛选组样式适配 */
            .drawer-content .filter-group {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                margin-bottom: 1rem;
            }

            .drawer-content .filter-buttons {
                flex-wrap: wrap;
                gap: 0.4rem;
            }

            .drawer-content .filter-btn {
                font-size: 0.7rem;
                padding: 0.2rem 0.8rem;
            }
        }

        /* 桌面版无抽屉样式 */
        @media (min-width: 641px) {
            .mobile-drawer {
                display: none;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚙️Knightmare Frame图鉴⚙️</h1>
    </div>

    <!-- 桌面版筛选栏 -->
    <div class="filter-bar" id="desktop-filter-bar"></div>

    <!-- 机体列表容器 -->
    <div id="kmf-list-container" class="kmf-grid">
        <div class="loading">加载机动兵器数据中 ... ⚡</div>
    </div>

    <div class="footer">
        © 布里塔尼亚帝国技术部 · 机体总数: <span id="total-count">0</span>
    </div>
</div>

<!-- 移动端抽屉筛选器 -->
<div id="mobile-drawer" class="mobile-drawer">
    <div class="drawer-handle" id="drawer-handle">
        <div class="drag-bar"></div>
        <span>📋上拉展开筛选</span>
    </div>
    <div class="drawer-content" id="drawer-content"></div>
</div>

<script>
    const LIST_JSON_URL = "./kmf_list_3.json";
    let allKmfData = [];
    let currentCategory = null;
    let currentValue = null;

    const categoryNames = {
        "Anime": "📺 动画",
        "Manga": "📖 漫画",
        "Game": "🎮 游戏",
    };

    // 辅助函数
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 获取唯一分类值
    function getUniqueValuesForCategory(category) {
        const values = new Set();
        allKmfData.forEach(kmf => {
            const cats = kmf.categories || {};
            const arr = cats[category];
            if (Array.isArray(arr)) {
                arr.forEach(v => values.add(v));
            } else if (typeof arr === 'string') {
                values.add(arr);
            }
        });
        return Array.from(values).sort((a, b) => a.localeCompare(b, 'zh'));
    }

    // 生成筛选 HTML (通用，用于桌面和移动)
    function generateFilterHTML() {
        const categories = Object.keys(categoryNames);
        let html = '';
        categories.forEach(cat => {
            const values = getUniqueValuesForCategory(cat);
            if (values.length === 0) return;
            html += `<div class="filter-group">
                        <label>${categoryNames[cat]}:</label>
                        <div class="filter-buttons" data-category="${cat}">
                            <button class="filter-btn category-all" data-category="${cat}" data-value="__all__">全部</button>`;
            values.forEach(val => {
                html += `<button class="filter-btn" data-category="${cat}" data-value="${escapeHtml(val)}">${escapeHtml(val)}</button>`;
            });
            html += `</div></div>`;
        });
        return html;
    }

    // 渲染筛选栏（桌面版和移动版分别填充）
    function buildFilterBars() {
        const html = generateFilterHTML();
        const desktopContainer = document.getElementById('desktop-filter-bar');
        const mobileContent = document.getElementById('drawer-content');
        if (desktopContainer) desktopContainer.innerHTML = html;
        if (mobileContent) mobileContent.innerHTML = html;
        // 绑定所有 .filter-btn 的点击事件
        bindAllFilterButtons();
    }

    // 绑定所有分类按钮事件（动态生成后调用）
    function bindAllFilterButtons() {
        document.querySelectorAll('.filter-btn[data-category]').forEach(btn => {
            btn.removeEventListener('click', handleFilterClick);
            btn.addEventListener('click', handleFilterClick);
        });
    }

    function handleFilterClick(e) {
        const btn = e.currentTarget;
        const category = btn.dataset.category;
        let value = btn.dataset.value;
        if (value === '__all__') {
            if (currentCategory === category && currentValue === null) {
                // 已是全部，无需变化
            } else {
                currentCategory = category;
                currentValue = null;
            }
        } else {
            currentCategory = category;
            currentValue = value;
        }
        updateActiveButtonForAll(category, value);
        renderFilteredList();
    }

    function updateActiveButtonForAll(category, value) {
        // 更新桌面版和移动版按钮高亮
        const groups = document.querySelectorAll(`.filter-buttons[data-category="${category}"]`);
        groups.forEach(group => {
            group.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (value === null) {
                const allBtn = group.querySelector('.category-all');
                if (allBtn) allBtn.classList.add('active');
            } else {
                const targetBtn = group.querySelector(`.filter-btn[data-value="${escapeHtml(value)}"]`);
                if (targetBtn) targetBtn.classList.add('active');
            }
        });
    }

    function resetFilters() {
        currentCategory = null;
        currentValue = null;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        renderFilteredList();
    }

    function getFilteredKmf() {
        if (!currentCategory || !currentValue) return allKmfData;
        return allKmfData.filter(kmf => {
            const cats = kmf.categories || {};
            const values = cats[currentCategory];
            if (!values) return false;
            if (Array.isArray(values)) return values.includes(currentValue);
            return values === currentValue;
        });
    }

    function renderFilteredList() {
        const container = document.getElementById('kmf-list-container');
        const filtered = getFilteredKmf();
        if (filtered.length === 0) {
            container.innerHTML = '<div class="no-result">⚠️ 没有找到符合筛选条件的机体</div>';
            document.getElementById('total-count').innerText = allKmfData.length;
            return;
        }
        container.innerHTML = '';
        filtered.forEach(kmf => {
            const card = createKmfCard(kmf);
            container.appendChild(card);
        });
        document.getElementById('total-count').innerText = allKmfData.length;
    }

    function createKmfCard(kmf) {
        const engName = kmf.name;
        const chnName = kmf.chinese_name || kmf.name;
        const thumbPath = `./images/kmf_gallery/${encodeURIComponent(engName)}/cover_thumb.jpg`;

        const card = document.createElement('div');
        card.className = 'kmf-card';
        card.addEventListener('click', () => {
            window.location.href = `detail.html?kmf=${encodeURIComponent(engName)}`;
        });

        const imgDiv = document.createElement('div');
        imgDiv.className = 'card-img';
        const img = document.createElement('img');
        img.src = thumbPath;
        img.alt = chnName;
        img.loading = 'lazy';
        img.onerror = (e) => {
            e.target.onerror = null;
            e.target.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 85'%3E%3Crect width='60' height='85' fill='%23151f2c'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23dbb45c' font-size='9'%3E${engName.substring(0, 6)}%3C/text%3E%3C/svg%3E`;
            img.style.objectFit = 'contain';
        };
        imgDiv.appendChild(img);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'card-info';
        infoDiv.innerHTML = `
            <div class="chinese-name" title="${escapeHtml(chnName)}">${escapeHtml(chnName)}</div>
            <div class="english-name" title="${escapeHtml(engName)}">${escapeHtml(engName)}</div>
        `;

        card.appendChild(imgDiv);
        card.appendChild(infoDiv);
        return card;
    }

    // 设置默认筛选：Anime -> Code Geass: Lelouch of the Rebellion
    function setDefaultFilter() {
        if (!allKmfData.length) return;
        const animeValues = getUniqueValuesForCategory("Anime");
        const defaultVal = "Code Geass: Lelouch of the Rebellion";
        if (!animeValues.includes(defaultVal)) {
            console.warn(`默认筛选值 "${defaultVal}" 不在Anime中`);
            return;
        }
        currentCategory = "Anime";
        currentValue = defaultVal;
        updateActiveButtonForAll("Anime", defaultVal);
        renderFilteredList();
    }

    function updateDrawerLabel() {
        const drawer = document.getElementById('mobile-drawer');
        const labelSpan = drawer?.querySelector('.drawer-handle span');
        if (!drawer || !labelSpan) return;
        if (drawer.classList.contains('open')) {
            labelSpan.innerText = '⬇️ 下拉回收筛选';
        } else {
            labelSpan.innerText = '⬆️ 上拉展开筛选';
        }
    }

    // 移动端抽屉交互 (拖拽 + 点击)
    function initMobileDrawer() {
        const drawer = document.getElementById('mobile-drawer');
        const handle = document.getElementById('drawer-handle');
        if (!drawer || !handle) return;

        let startY = 0;
        let startTransform = 0;
        let isDragging = false;

        // ---------- 辅助函数：设置状态并更新文字 ----------
        function setDrawerState(open) {
            if (open) {
                drawer.classList.add('open');
            } else {
                drawer.classList.remove('open');
            }
            updateDrawerLabel();  // 关键！文字跟随状态变化
        }

        // 设置初始状态文字（确保默认收起时显示“上拉展开筛选”）
        setDrawerState(drawer.classList.contains('open'));

        // 点击头部切换
        handle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = drawer.classList.contains('open');
            setDrawerState(!isOpen);
            // 重置拖拽样式（防止残留）
            drawer.style.transform = '';
            drawer.style.transition = 'transform 0.3s ease';
        });

        // 触摸拖拽逻辑
        handle.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            const isOpen = drawer.classList.contains('open');
            const maxTranslate = drawer.offsetHeight - 48;
            startTransform = isOpen ? 0 : maxTranslate;
            isDragging = true;
            drawer.style.transition = 'none';
            // 可选项：禁用页面滚动
            e.preventDefault();
        });

        handle.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            let newTranslate = startTransform + deltaY;
            const maxTranslate = drawer.offsetHeight - 48;
            newTranslate = Math.min(maxTranslate, Math.max(0, newTranslate));
            drawer.style.transform = `translateY(${newTranslate}px)`;
            e.preventDefault();
        });

        handle.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            drawer.style.transition = 'transform 0.3s ease';
            const currentTranslate = parseFloat(drawer.style.transform.replace('translateY(', '').replace('px)', ''));
            const maxTranslate = drawer.offsetHeight - 48;
            const threshold = maxTranslate / 2;
            if (currentTranslate < threshold) {
                setDrawerState(true);
                drawer.style.transform = '';
            } else {
                setDrawerState(false);
                drawer.style.transform = '';
            }
        });
    }

    async function init() {
        const container = document.getElementById('kmf-list-container');
        try {
            const res = await fetch(LIST_JSON_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = '<div class="error-msg">⚠️ 机体列表为空</div>';
                return;
            }
            allKmfData = data;
            document.getElementById('total-count').innerText = allKmfData.length;
            buildFilterBars();
            setDefaultFilter();
            initMobileDrawer();
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error-msg">❌ 加载失败: ${err.message}<br>请确认 kmf_list_3.json 存在且格式正确</div>`;
        }
    }

    init();
</script>
</body>
</html>
