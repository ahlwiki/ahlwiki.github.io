<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMF 详细档案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f17;
            font-family: 'Segoe UI', 'Roboto', system-ui;
            color: #eef2ff;
            padding: 2rem 1.5rem;
        }
        .detail-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(12, 18, 28, 0.85);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #d4af37;
            color: #0a0f1a;
        }
        .kmf-header {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a3448;
            padding-bottom: 1.5rem;
        }
        .kmf-image {
            flex: 1;
            min-width: 260px;
            text-align: center;
        }
        .kmf-image img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        .image-buttons {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }
        .img-btn {
            background: #1f2a3e;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #e6e9f0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .img-btn.active {
            background: #d4af37;
            color: #0a0f1a;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.6);
        }
        .kmf-title {
            flex: 2;
        }
        .kmf-title h1 {
            font-size: 2.8rem;
            color: #ffdd99;
            word-break: break-word;
        }
        .kmf-title .sub {
            font-size: 1rem;
            color: #bcafa2;
            margin-top: 0.5rem;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .spec-card {
            background: #0f1622cc;
            border-left: 3px solid #d4af37;
            padding: 1rem;
            border-radius: 1rem;
        }
        .spec-card h3 {
            color: #e6c87a;
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
        }
        .spec-item {
            display: flex;
            flex-wrap: wrap;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #2a3440;
        }
        .spec-label {
            width: 130px;
            font-weight: bold;
            color: #9aaec9;
        }
        .spec-value {
            flex: 1;
            color: #f0f2f5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .intro-text {
            line-height: 1.6;
            background: #010a14;
            padding: 1.2rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .error-msg {
            text-align: center;
            padding: 2rem;
            color: #e07c5c;
            font-size: 1.2rem;
        }
        @media (max-width: 700px) {
            .detail-container { padding: 1rem; }
            .spec-label { width: 100px; }
            .kmf-title h1 { font-size: 1.8rem; }
            /* 手机端隐藏英文名及字段标签 */
            .eng-part,
            .field-label {
                display: none;
            }
            /* 调整副标题间距 */
            .kmf-title .sub {
                font-size: 0.9rem;
            }
            .kmf-header {
                flex-direction: column;   /* 改为垂直排列 */
                align-items: center;      /* 可选：整体居中 */
                gap: 0.5rem;
            }
            .image-buttons {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
<div class="detail-container">
    <a href="index.html" class="back-link">← 返回机体列表</a>
    <div id="kmfContent">
        <div style="text-align:center; padding: 3rem;">加载档案中...</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const kmfName = urlParams.get('kmf');
    if (!kmfName) {
        document.getElementById('kmfContent').innerHTML = '<div class="error-msg">❌ 未指定机体代号</div>';
        throw new Error('No kmf name');
    }

    const jsonPath = `./kmf_individual_files/${encodeURIComponent(kmfName)}.json`;

    async function loadDetail() {
        const container = document.getElementById('kmfContent');
        try {
            const resp = await fetch(jsonPath);
            if (!resp.ok) throw new Error(`HTTP ${resp.status} - 文件不存在`);
            const data = await resp.json();

            const specs = data.specs || {};
            const nameZh = data.name || kmfName;
            const englishName = data.english_name || '';
            const intro = data.introduction || '暂无简介';
            const design = data["Design and Development"] || '';
            const design2 = data["Design and Specifications"] || '';
            const trivia = data.Trivia || '';
            const trivia2 = data["Operational History"] || '';

            function getSpec(key) {
                return specs[key] || '—';
            }

            // 获取图片变体列表（原样使用，不额外添加 Standard）
            let variants = data.image_variants || [];
            // 去重
            variants = [...new Set(variants)];

            let buttonsHtml = '';
            let showButtons = variants.length > 1;
            if (showButtons) {
                buttonsHtml = `<div class="image-buttons" id="image-buttons">`;
                variants.forEach(variant => {
                    const btnName = variant === "Standard" ? "标准" : variant;
                    buttonsHtml += `<button class="img-btn" data-variant="${variant}">${escapeHtml(btnName)}</button>`;
                });
                buttonsHtml += `</div>`;
            } else if (variants.length === 1) {
                // 只有一个变体时不显示按钮（隐藏）
                showButtons = false;
            }

            const basePath = `./images/kmf_gallery/${encodeURIComponent(kmfName)}/`;

            function setImage(imgElement, variant) {
                if (variant === "Standard") {
                    // Standard 图片：优先 jpg，失败后 png，再失败占位符
                    imgElement.src = `${basePath}Standard.jpg`;
                    imgElement.onerror = function() {
                        imgElement.onerror = null;
                        imgElement.src = `${basePath}Standard.png`;
                        imgElement.onerror = function() {
                            imgElement.onerror = null;
                            imgElement.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'%3E%3Crect width='400' height='300' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37'%3E⚙️ ${nameZh}%3C/text%3E%3C/svg%3E`;
                        };
                    };
                } else {
                    // 非 Standard 变体：直接 webp
                    imgElement.src = `${basePath}${variant}.webp`;
                    imgElement.onerror = function() {
                        imgElement.onerror = null;
                        imgElement.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'%3E%3Crect width='400' height='300' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37'%3E⚙️ ${nameZh}%3C/text%3E%3C/svg%3E`;
                    };
                }
            }

            const html = `
                <div class="kmf-header">
                    <div class="kmf-image">
                        <img id="detail-img" src="" alt="${nameZh}">
                        ${buttonsHtml}
                    </div>
                    <div class="kmf-title">
                        <h1>${escapeHtml(nameZh)}</h1>
                        <div class="sub"><span class="eng-part">${escapeHtml(englishName)} | </span><span class="field-label">型号: </span>${getSpec("Model Number")}</div>
                        <div class="sub"><span class="field-label">世代: </span>${getSpec("KMF Generation")} | <span class="field-label">高度: </span>${getSpec("Overall Height")} | <span class="field-label">重量: </span>${getSpec("Gross Weight")}</div>
                    </div>
                </div>
                <div class="specs-grid">
                    <div class="spec-card"><h3>⚙️ 基本规格</h3>
                        <div class="spec-item"><span class="spec-label">动力源</span><span class="spec-value">${getSpec("Power Source")}</span></div>
                        <div class="spec-item"><span class="spec-label">装甲材料</span><span class="spec-value">${getSpec("Armor Materials")}</span></div>
                        <div class="spec-item"><span class="spec-label">制造商</span><span class="spec-value">${getSpec("Manufacturer")}</span></div>
                        <div class="spec-item"><span class="spec-label">发展自</span><span class="spec-value">${getSpec("Developed From")}</span></div>
                        <div class="spec-item"><span class="spec-label">衍生型</span><span class="spec-value">${getSpec("Developed Into")}</span></div>
                        <div class="spec-item"><span class="spec-label">模式</span><span class="spec-value">${getSpec("Modes")}</span></div>
                    </div>
                    <div class="spec-card"><h3>🗡️ 武装 & 系统</h3>
                        <div class="spec-item"><span class="spec-label">固定武装</span><span class="spec-value">${getSpec("Fixed")}</span></div>
                        <div class="spec-item"><span class="spec-label">手持武器</span><span class="spec-value">${getSpec("Handheld")}</span></div>
                        <div class="spec-item"><span class="spec-label">特殊系统</span><span class="spec-value">${getSpec("Standard")}</span></div>
                    </div>
                    <div class="spec-card"><h3>📜 作战信息</h3>
                        <div class="spec-item"><span class="spec-label">驾驶员</span><span class="spec-value">${getSpec("Known Pilots")}</span></div>
                        <div class="spec-item"><span class="spec-label">所属势力</span><span class="spec-value">${getSpec("Operators")}</span></div>
                        <div class="spec-item"><span class="spec-label">原作登场</span><span class="spec-value">${getSpec("Manga") || '—'}</span></div>
                    </div>
                </div>
                <div class="intro-text">
                    <strong>📖 机体介绍</strong><br>${escapeHtml(intro)}<br><br>
                    ${design ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design)}<br><br>` : ''}
                    ${design2 ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design2)}<br><br>` : ''}
                    ${trivia ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia)}` : ''}
                    ${trivia2 ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia2)}` : ''}
                </div>
            `;
            container.innerHTML = html;

            const imgElement = document.getElementById('detail-img');
            // 默认加载第一个变体（如果存在），否则加载 Standard
            const defaultVariant = (variants.length > 0) ? variants[0] : "Standard";
            setImage(imgElement, defaultVariant);

            if (showButtons) {
                const buttons = document.querySelectorAll('.img-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const variant = btn.dataset.variant;
                        setImage(imgElement, variant);
                        buttons.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    });
                    // 高亮默认按钮
                    if (btn.dataset.variant === defaultVariant) {
                        btn.classList.add('active');
                    }
                });
            }
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error-msg">⚠️ 机体档案加载失败: ${err.message}<br>请确保文件 ${kmfName}.json 存在于 /kmf_individual_files/ 目录下</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    loadDetail();
</script>
</body>
</html>
