<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KMF 详细档案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f17;
            font-family: 'Segoe UI', 'Roboto', system-ui;
            color: #eef2ff;
            padding: 2rem 1.5rem;
        }
        .detail-container {
            margin: 0 auto;
            background: rgba(12, 18, 28, 0.85);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            transition: 0.2s;
        }
        .back-link:hover {
            background: #d4af37;
            color: #0a0f1a;
        }
        .kmf-header {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a3448;
            padding-bottom: 1.5rem;
        }
        .kmf-image {
            flex: 1;
            min-width: 260px;
            text-align: center;
        }
        .kmf-image img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            object-fit: contain;
        }
        .image-buttons {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }
        .img-btn {
            background: #1f2a3e;
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #e6e9f0;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .img-btn.active {
            background: #d4af37;
            color: #0a0f1a;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.6);
        }
        .kmf-title {
            flex: 2;
        }
        .kmf-title h1 {
            font-size: 2.8rem;
            color: #ffdd99;
            word-break: break-word;
        }
        .kmf-title .sub {
            font-size: 1rem;
            color: #bcafa2;
            margin-top: 0.5rem;
        }
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .spec-card {
            background: #0f1622cc;
            border-left: 3px solid #d4af37;
            padding: 1rem;
            border-radius: 1rem;
        }
        .spec-card h3 {
            color: #e6c87a;
            margin-bottom: 0.8rem;
            font-size: 1.3rem;
        }
        .spec-item {
            display: flex;
            flex-wrap: wrap;
            padding: 0.4rem 0;
            border-bottom: 1px dashed #2a3440;
        }
        .spec-label {
            width: 130px;
            font-weight: bold;
            color: #9aaec9;
        }
        .spec-value {
            flex: 1;
            color: #f0f2f5;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .intro-text {
            line-height: 1.6;
            background: #010a14;
            padding: 1.2rem;
            border-radius: 1rem;
            margin: 1rem 0;
        }
        .error-msg {
            text-align: center;
            padding: 2rem;
            color: #e07c5c;
            font-size: 1.2rem;
        }

        /* 手机端样式 */
        @media (max-width: 700px) {
            body { padding: 0.5rem; }
            .detail-container { padding: 0rem; border: none; }
            .desktop-only .back-link { display: none; }
            .mobile-layout { display: block; }
            .kmf-title-mobile {
                text-align: center;
                margin-bottom: 1rem;
            }
            .kmf-title-mobile h1 { font-size: 1.8rem; color: #ffdd99; }
            .kmf-title-mobile .sub { font-size: 0.8rem; color: #bcafa2; }

            /* 单图居中 */
            .image-single {
                display: flex;
                justify-content: center;
                margin-bottom: 1rem;
            }
            .image-single img {
                max-width: 100%;
                max-height: 240px;
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            }
            /* 两图并排居中 */
            .image-double {
                display: flex;
                justify-content: center;
                gap: 1rem;
                margin-bottom: 1rem;
                flex-wrap: wrap;
            }
            .image-double .image-item {
                flex: 0 0 auto;
                width: 150px;
                text-align: center;
            }
            .image-double img {
                width: 100%;
                height: auto;
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.3);
                object-fit: contain;
                max-height: 200px;
            }
            .image-double .img-label {
                margin-top: 0.4rem;
                font-size: 0.7rem;
                color: #e6c87a;
                text-align: center;
                word-break: break-word;
            }
            /* 多图横滑 */
            .image-scroll-container {
                width: 100%;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: thin;
                margin-bottom: 1rem;
            }
            .image-scroll-wrapper {
                display: flex;
                gap: 1rem;
                padding: 0.5rem 0.2rem;
            }
            .image-scroll-item {
                display: inline-flex;
                flex-direction: column;
                align-items: center;
                width: 150px;
                flex-shrink: 0;
            }
            .image-scroll-item img {
                width: 100%;
                height: auto;
                background: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.3);
                object-fit: contain;
                max-height: 200px;
            }
            .img-label {
                margin-top: 0.4rem;
                font-size: 0.7rem;
                color: #e6c87a;
                text-align: center;
                word-break: break-word;
                white-space: normal;
                max-width: 150px;
            }

            .specs-table {
                margin: 1rem 0;
                background: #0f1622cc;
                border-radius: 0.8rem;
                overflow: hidden;
            }
            .specs-row {
                display: flex;
                padding: 0.6rem 0.8rem;
                border-bottom: 1px solid #2a3440;
            }
            .specs-row .specs-label {
                font-size: 0.8rem;
                width: 80px;
                font-weight: bold;
                color: #9aaec9;
                flex-shrink: 0;
            }
            .specs-row .specs-value {
                font-size: 0.8rem;
                flex: 1;
                color: #f0f2f5;
                word-break: break-word;
                white-space: pre-wrap;
            }
            .more-btn {
                display: block;
                width: 100%;
                background: #1f2a3e;
                border: none;
                padding: 0.5rem;
                text-align: center;
                color: #d4af37;
                font-weight: bold;
                cursor: pointer;
                border-radius: 0 0 0.8rem 0.8rem;
                transition: 0.2s;
            }
            .more-btn:hover {
                background: #d4af37;
                color: #0a0f1a;
            }
            .intro-text {
                font-size: 0.9rem;
                padding: 0.8rem;
            }
        }

        @media (min-width: 701px) {
            .mobile-layout { display: none; }
        }
        @media (max-width: 700px) {
            .desktop-layout { display: none; }
        }
    </style>
</head>
<body>
<div class="detail-container" id="detail-container">
    <div class="desktop-layout" id="desktop-layout">
        <a href="index.html" class="back-link">← 返回机体列表</a>
        <div id="desktopContent"></div>
    </div>
    <div class="mobile-layout" id="mobile-layout">
        <div id="mobileContent"></div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const kmfName = urlParams.get('kmf');
    if (!kmfName) {
        document.getElementById('desktopContent').innerHTML = '<div class="error-msg">❌ 未指定机体代号</div>';
        document.getElementById('mobileContent').innerHTML = '<div class="error-msg">❌ 未指定机体代号</div>';
        throw new Error('No kmf name');
    }

    const jsonPath = `./kmf_individual_files/${encodeURIComponent(kmfName)}.json`;

    // 桌面端字段分组（不变）
    const groups = [
        {
            title: "⚙️ 基本规格",
            fields: [
                { key: "Classification", label: "分类" }, { key: "Official Name", label: "官方名称" },
                { key: "Codename", label: "代号" }, { key: "Crew", label: "乘员" },
                { key: "Power Source", label: "动力源" }, { key: "Armor Materials", label: "装甲材料" },
                { key: "Developer", label: "开发者" }, { key: "Manufacturer", label: "制造商" },
                { key: "Produced Units", label: "生产数量" }, { key: "Status", label: "状态" },
                { key: "First deployment", label: "首次部署" }, { key: "Last Seen", label: "最后出现" },
                { key: "Combines Into", label: "合体目标" }, { key: "Developed From", label: "发展自" },
                { key: "Developed Into", label: "衍生型" }, { key: "Modes", label: "模式/形态" }
            ]
        },
        {
            title: "🗡️ 武装 & 系统",
            fields: [
                { key: "Fixed", label: "固定武装" }, { key: "Handheld", label: "手持武器" },
                { key: "Standard", label: "特殊系统" }, { key: "Optional", label: "可选装备" }
            ]
        },
        {
            title: "📜 作战 & 背景",
            fields: [
                { key: "Known Pilots", label: "驾驶员" }, { key: "Operators", label: "所属势力" },
                { key: "Anime", label: "动画登场" }, { key: "Manga", label: "漫画登场" },
                { key: "Novel", label: "小说登场" }, { key: "Game", label: "游戏登场" },
                { key: "Mechanical Designer", label: "机械设计" }
            ]
        }
    ];

    function getSpecValue(specs, key) {
        const val = specs[key];
        return (val !== undefined && val !== null && val !== "") ? val : null;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== 桌面端渲染 ==========
    function renderDesktop(data) {
        const specs = data.specs || {};
        const nameZh = data.name || kmfName;
        const englishName = data.english_name || '';
        const intro = data.introduction || '暂无简介';
        const design = data["Design and Development"] || '';
        const design2 = data["Design and Specifications"] || '';
        const trivia = data.Trivia || '';
        const trivia2 = data["Operational History"] || '';

        function getSpec(key) { return getSpecValue(specs, key) || '—'; }

        let variants = data.image_variants || [];
        variants = [...new Set(variants)];
        let showButtons = variants.length > 1;
        let buttonsHtml = '';
        if (showButtons) {
            buttonsHtml = `<div class="image-buttons" id="image-buttons">`;
            variants.forEach(variant => {
                const btnName = variant === "Standard" ? "标准" : variant;
                buttonsHtml += `<button class="img-btn" data-variant="${variant}">${escapeHtml(btnName)}</button>`;
            });
            buttonsHtml += `</div>`;
        }

        const basePath = `./images/kmf_gallery/${encodeURIComponent(kmfName)}/`;

        let specsGridHtml = '<div class="specs-grid">';
        for (const group of groups) {
            let hasAny = false;
            let itemsHtml = '';
            for (const field of group.fields) {
                const value = getSpecValue(specs, field.key);
                if (value) {
                    hasAny = true;
                    itemsHtml += `<div class="spec-item"><span class="spec-label">${field.label}</span><span class="spec-value">${escapeHtml(value)}</span></div>`;
                }
            }
            if (hasAny) {
                specsGridHtml += `<div class="spec-card"><h3>${group.title}</h3>${itemsHtml}</div>`;
            }
        }
        specsGridHtml += '</div>';
        if (!specsGridHtml.includes('spec-card')) {
            specsGridHtml = '<div class="specs-grid"><div class="spec-card"><h3>⚠️ 暂无详细规格数据</h3></div></div>';
        }

        const html = `
            <div class="kmf-header">
                <div class="kmf-image">
                    <img id="detail-img" src="" alt="${nameZh}">
                    ${buttonsHtml}
                </div>
                <div class="kmf-title">
                    <h1>${escapeHtml(nameZh)}</h1>
                    <div class="sub"><span class="eng-part">${escapeHtml(englishName)} | </span><span class="field-label">型号: </span>${getSpec("Model Number")}</div>
                    <div class="sub"><span class="field-label">世代: </span>${getSpec("KMF Generation")} | <span class="field-label">高度: </span>${getSpec("Overall Height")} | <span class="field-label">重量: </span>${getSpec("Gross Weight")}</div>
                </div>
            </div>
            ${specsGridHtml}
            <div class="intro-text">
                <strong>📖 机体介绍</strong><br>${escapeHtml(intro)}<br><br>
                ${design ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design)}<br><br>` : ''}
                ${design2 ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design2)}<br><br>` : ''}
                ${trivia ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia)}` : ''}
                ${trivia2 ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia2)}` : ''}
            </div>
        `;
        document.getElementById('desktopContent').innerHTML = html;

        const imgElement = document.getElementById('detail-img');
        const defaultVariant = (variants.length > 0) ? variants[0] : "Standard";
        setImageDesktop(imgElement, defaultVariant, basePath, nameZh);
        if (showButtons) {
            const buttons = document.querySelectorAll('.img-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const variant = btn.dataset.variant;
                    setImageDesktop(imgElement, variant, basePath, nameZh);
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                if (btn.dataset.variant === defaultVariant) btn.classList.add('active');
            });
        }
    }

    function setImageDesktop(img, variant, basePath, fallbackText) {
        if (variant === "Standard") {
            const extensions = ['jpg', 'webp', 'png'];
            let attempt = 0;
            const tryNext = () => {
                if (attempt >= extensions.length) {
                    img.onerror = null;
                    img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'%3E%3Crect width='400' height='300' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37'%3E⚙️ ${fallbackText}%3C/text%3E%3C/svg%3E`;
                    return;
                }
                img.src = `${basePath}Standard.${extensions[attempt]}`;
                img.onerror = () => { img.onerror = null; attempt++; tryNext(); };
            };
            tryNext();
        } else {
            img.src = `${basePath}${variant}.webp`;
            img.onerror = function() {
                img.onerror = null;
                img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 300'%3E%3Crect width='400' height='300' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37'%3E⚙️ ${fallbackText}%3C/text%3E%3C/svg%3E`;
            };
        }
    }

    // ========== 手机端渲染 ==========
    function renderMobile(data) {
        const specs = data.specs || {};
        const nameZh = data.name || kmfName;
        const englishName = data.english_name || '';
        const intro = data.introduction || '暂无简介';
        const design = data["Design and Development"] || '';
        const design2 = data["Design and Specifications"] || '';
        const trivia = data.Trivia || '';
        const trivia2 = data["Operational History"] || '';

        let variants = data.image_variants || [];
        variants = [...new Set(variants)];

        const basePath = `./images/kmf_gallery/${encodeURIComponent(kmfName)}/`;

        // 图片区域 HTML（根据数量不同布局）
        let imagesHtml = '';
        if (variants.length === 0) {
            imagesHtml = '';
        } else if (variants.length === 1) {
            const variant = variants[0];
            imagesHtml = `<div class="image-single"><img class="single-img" data-variant="${variant}" src="" alt="${nameZh}"></div>`;
        } else if (variants.length === 2) {
            let itemsHtml = '';
            for (let variant of variants) {
                itemsHtml += `
                    <div class="image-item">
                        <img class="double-img" data-variant="${variant}" src="" alt="${variant}">
                        <div class="img-label">${escapeHtml(variant)}</div>
                    </div>
                `;
            }
            imagesHtml = `<div class="image-double">${itemsHtml}</div>`;
        } else {
            let itemsHtml = '';
            for (let variant of variants) {
                itemsHtml += `
                    <div class="image-scroll-item">
                        <img class="scroll-img" data-variant="${variant}" src="" alt="${variant}">
                        <div class="img-label">${escapeHtml(variant)}</div>
                    </div>
                `;
            }
            imagesHtml = `<div class="image-scroll-container"><div class="image-scroll-wrapper">${itemsHtml}</div></div>`;
        }

        // ----- 构建手机端规格条目，高度和重量合并为一行 -----
        // 普通字段（除了高度和重量）
        const orderedKeys = [
            "Classification", "Official Name", "Codename", "Crew", "Power Source", "Armor Materials",
            "Developer", "Manufacturer", "Produced Units", "Status", "First deployment", "Last Seen",
            "Combines Into", "Developed From", "Developed Into", "Modes", "Fixed", "Handheld", "Standard",
            "Optional", "Known Pilots", "Operators", "Anime", "Manga", "Novel", "Game", "Mechanical Designer"
        ];
        const labelMap = {
            "Classification": "分类", "Official Name": "官方名称", "Codename": "代号", "Crew": "乘员",
            "Power Source": "动力源", "Armor Materials": "装甲材料", "Developer": "开发者", "Manufacturer": "制造商",
            "Produced Units": "生产数量", "Status": "状态", "First deployment": "首次部署", "Last Seen": "最后出现",
            "Combines Into": "合体目标", "Developed From": "发展自", "Developed Into": "衍生型", "Modes": "模式/形态",
            "Fixed": "固定武装", "Handheld": "手持武器", "Standard": "特殊系统", "Optional": "可选装备",
            "Known Pilots": "驾驶员", "Operators": "所属势力", "Anime": "动画登场", "Manga": "漫画登场",
            "Novel": "小说登场", "Game": "游戏登场", "Mechanical Designer": "机械设计"
        };
        const allEntries = [];

        // 先处理普通字段（不包括高度和重量）
        for (let key of orderedKeys) {
            const val = getSpecValue(specs, key);
            if (val) {
                allEntries.push({ label: labelMap[key] || key, value: val });
            }
        }

        // 处理高度和重量合并
        const height = getSpecValue(specs, "Overall Height");
        const weight = getSpecValue(specs, "Gross Weight");
        let combinedValue = '';
        if (height && weight) {
            combinedValue = `${height} | ${weight}`;
        } else if (height) {
            combinedValue = height;
        } else if (weight) {
            combinedValue = weight;
        }
        if (combinedValue) {
            allEntries.unshift({ label: "高度 | 重量", value: combinedValue });
        }

        // 补充可能遗漏的字段（排除已处理的）
        const excludeKeys = ["Model Number", "KMF Generation", "Overall Height", "Gross Weight"];
        for (let [key, val] of Object.entries(specs)) {
            if (val && !orderedKeys.includes(key) && !excludeKeys.includes(key)) {
                allEntries.push({ label: labelMap[key] || key, value: val });
            }
        }

        // 手机端标题区，隐藏“型号:”、“世代:”标签，只显示数值
        const modelNum = getSpecValue(specs, "Model Number");
        const gen = getSpecValue(specs, "KMF Generation");
        let titleExtraHtml = '';
        if (modelNum || gen) {
            let parts = [];
            if (modelNum) parts.push(`${escapeHtml(modelNum)}`);
            if (gen) parts.push(`${escapeHtml(gen)}`);
            titleExtraHtml = `<div class="sub" style="font-size:0.7rem">${parts.join(' | ')}</div>`;
        }

        const INITIAL_SHOW = 5;
        let specsTableHtml = `<div class="specs-table" id="specs-table-mobile">`;
        for (let i = 0; i < Math.min(INITIAL_SHOW, allEntries.length); i++) {
            specsTableHtml += `<div class="specs-row"><div class="specs-label">${escapeHtml(allEntries[i].label)}</div><div class="specs-value">${escapeHtml(allEntries[i].value)}</div></div>`;
        }
        specsTableHtml += `</div>`;
        if (allEntries.length > INITIAL_SHOW) {
            specsTableHtml += `<button id="toggle-specs-btn" class="more-btn">更多 ↓</button>`;
        } else if (allEntries.length === 0) {
            specsTableHtml = `<div class="specs-table"><div class="specs-row"><div class="specs-value">暂无详细规格</div></div></div>`;
        }

        const html = `
            <div class="kmf-title-mobile">
                <h1>${escapeHtml(nameZh)}</h1>
                <div class="sub">${escapeHtml(englishName)}</div>
                ${titleExtraHtml}
            </div>
            ${imagesHtml}
            ${specsTableHtml}
            <div class="intro-text">
                <strong>📖 机体介绍</strong><br>${escapeHtml(intro)}<br><br>
                ${design ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design)}<br><br>` : ''}
                ${design2 ? `<strong>🔧 开发背景</strong><br>${escapeHtml(design2)}<br><br>` : ''}
                ${trivia ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia)}` : ''}
                ${trivia2 ? `<strong>💡 历史/轶事</strong><br>${escapeHtml(trivia2)}` : ''}
            </div>
        `;

        const mobileContainer = document.getElementById('mobileContent');
        mobileContainer.innerHTML = html;

        // 加载手机端图片
        if (variants.length === 1) {
            const singleImg = document.querySelector('.single-img');
            if (singleImg) {
                const variant = singleImg.dataset.variant;
                loadMobileImage(singleImg, variant, basePath, nameZh);
            }
        } else if (variants.length === 2) {
            const doubleImgs = document.querySelectorAll('.double-img');
            doubleImgs.forEach(img => {
                const variant = img.dataset.variant;
                loadMobileImage(img, variant, basePath, variant);
            });
        } else if (variants.length >= 3) {
            const scrollImgs = document.querySelectorAll('.scroll-img');
            scrollImgs.forEach(img => {
                const variant = img.dataset.variant;
                loadMobileImage(img, variant, basePath, variant);
            });
        }

        // 折叠/展开逻辑
        const toggleBtn = document.getElementById('toggle-specs-btn');
        if (toggleBtn) {
            let expanded = false;
            const fullHtml = allEntries.map(entry => `<div class="specs-row"><div class="specs-label">${escapeHtml(entry.label)}</div><div class="specs-value">${escapeHtml(entry.value)}</div></div>`).join('');
            const tableDiv = document.getElementById('specs-table-mobile');
            toggleBtn.addEventListener('click', () => {
                if (!expanded) {
                    tableDiv.innerHTML = fullHtml;
                    toggleBtn.innerHTML = '收起 ↑';
                    expanded = true;
                } else {
                    tableDiv.innerHTML = allEntries.slice(0, INITIAL_SHOW).map(entry => `<div class="specs-row"><div class="specs-label">${escapeHtml(entry.label)}</div><div class="specs-value">${escapeHtml(entry.value)}</div></div>`).join('');
                    toggleBtn.innerHTML = '更多 ↓';
                    expanded = false;
                }
            });
        }
    }

    function loadMobileImage(imgElement, variant, basePath, fallbackText) {
        if (variant === "Standard") {
            const extensions = ['jpg', 'webp', 'png'];
            let attempt = 0;
            const tryNext = () => {
                if (attempt >= extensions.length) {
                    imgElement.onerror = null;
                    imgElement.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 150 200'%3E%3Crect width='150' height='200' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37' font-size='12'%3E${fallbackText}%3C/text%3E%3C/svg%3E`;
                    return;
                }
                imgElement.src = `${basePath}Standard.${extensions[attempt]}`;
                imgElement.onerror = () => { imgElement.onerror = null; attempt++; tryNext(); };
            };
            tryNext();
        } else {
            imgElement.src = `${basePath}${variant}.webp`;
            imgElement.onerror = function() {
                imgElement.onerror = null;
                imgElement.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 150 200'%3E%3Crect width='150' height='200' fill='%23121a26'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%23d4af37' font-size='12'%3E${fallbackText}%3C/text%3E%3C/svg%3E`;
            };
        }
    }

    // 主流程
    async function loadData() {
        try {
            const resp = await fetch(jsonPath);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            const isMobile = window.innerWidth <= 700;
            if (isMobile) {
                renderMobile(data);
            } else {
                renderDesktop(data);
            }
            window.addEventListener('resize', () => {
                window.location.reload();
            });
        } catch (err) {
            const msg = `⚠️ 机体档案加载失败: ${err.message}<br>请确保文件 ${kmfName}.json 存在于 /kmf_individual_files/ 目录下`;
            document.getElementById('desktopContent').innerHTML = `<div class="error-msg">${msg}</div>`;
            document.getElementById('mobileContent').innerHTML = `<div class="error-msg">${msg}</div>`;
        }
    }

    loadData();
</script>
</body>
</html>
